<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아마란스 코드표 업로드 생성기 v4</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic','맑은 고딕',Arial,sans-serif; background: #f5f7fa; color: #2d3748; font-size: 14px; }
.container { max-width: 1300px; margin: 0 auto; padding: 24px; }
h1 { font-size: 22px; font-weight: 700; color: #1a365d; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #718096; margin-bottom: 24px; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 22px; margin-bottom: 18px; }
.card-title { font-size: 14px; font-weight: 700; color: #2d3748; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 22px; height: 22px; background: #3182ce; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: 11px; font-weight: 600; color: #4a5568; }
.fg input, .fg select { border: 1px solid #e2e8f0; border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; color: #2d3748; }
.fg input:focus, .fg select:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 2px rgba(49,130,206,.12); }
.fg .hint { font-size: 10px; color: #a0aec0; }

/* 업로드 영역 */
.upload-area { border: 2px dashed #bee3f8; border-radius: 10px; background: #f0f9ff; padding: 0; margin-bottom: 16px; overflow: hidden; }
.upload-label { display: block; padding: 28px; text-align: center; cursor: pointer; transition: background .15s; }
.upload-label:hover, .upload-area.dragover .upload-label { background: #ebf8ff; }
.upload-label .u-icon { font-size: 30px; margin-bottom: 8px; }
.upload-label .u-title { font-size: 14px; font-weight: 700; color: #2b6cb0; margin-bottom: 4px; }
.upload-label .u-sub { font-size: 11px; color: #718096; }
#fileInput { display: none; }
.upload-status { padding: 10px 16px; background: #ebf8ff; border-top: 1px solid #bee3f8; font-size: 12px; color: #2b6cb0; display: none; }

/* 파싱 결과 */
.import-box { border: 1px solid #bee3f8; border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
.import-box-head { background: #ebf8ff; padding: 10px 14px; font-size: 13px; font-weight: 700; color: #2b6cb0; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.itbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.itbl th { background: #f7fafc; padding: 7px 12px; text-align: left; font-weight: 700; color: #4a5568; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
.itbl td { padding: 7px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
.itbl tr:last-child td { border-bottom: none; }
.itbl tr:hover td { background: #f7fafc; }
.s-ok { color: #276749; font-weight: 700; }
.s-multi { color: #c05621; font-weight: 700; }
.s-none { color: #c53030; font-weight: 700; }
.msel { border: 1px solid #e2e8f0; border-radius: 4px; padding: 4px 6px; font-size: 11px; min-width: 180px; max-width: 300px; }

/* 수동 추가 */
.add-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
.add-row .fg { flex: 1; min-width: 160px; }
.add-row .fg.w80 { max-width: 80px; }
.add-row .fg.w140 { max-width: 140px; }

/* 품목 리스트 */
.plist { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
.plist-head, .plist-row { display: grid; grid-template-columns: 1fr 70px 140px 1fr 60px; gap: 8px; padding: 9px 12px; align-items: start; }
.plist-head { background: #f7fafc; font-size: 11px; font-weight: 700; color: #4a5568; border-bottom: 1px solid #e2e8f0; }
.plist-row { font-size: 12px; border-bottom: 1px solid #f0f4f8; }
.plist-row:last-child { border-bottom: none; }
.plist-row:hover { background: #f7fafc; }

/* 미리보기 테이블 */
.preview-wrap { overflow-x: auto; max-height: 350px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
.ptbl { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
.ptbl th { background: #2d3748; color: #fff; padding: 7px 11px; text-align: left; position: sticky; top: 0; }
.ptbl td { padding: 6px 11px; border-bottom: 1px solid #f0f4f8; }
.ptbl tr:hover td { background: #f7fafc; }

/* 버튼 */
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
.btn-blue { background: #3182ce; color: #fff; }
.btn-blue:hover { background: #2b6cb0; }
.btn-green { background: #38a169; color: #fff; padding: 10px 24px; font-size: 14px; }
.btn-green:hover { background: #2f855a; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-del { background: transparent; color: #e53e3e; border: 1px solid #fed7d7; padding: 3px 9px; font-size: 11px; border-radius: 5px; cursor: pointer; }
.btn-del:hover { background: #fff5f5; }

/* 칩 */
.chip { background: #ebf8ff; color: #2b6cb0; padding: 2px 6px; border-radius: 4px; font-weight: 700; font-family: monospace; font-size: 11px; }
.chip.m03 { background: #ebf8ff; color: #2b6cb0; }
.chip.m20 { background: #fefcbf; color: #744210; }
.chip.m09 { background: #e9d8fd; color: #553c9a; }
.chip.m19 { background: #fed7d7; color: #9b2c2c; }
.chip.m02 { background: #f0fff4; color: #276749; }

.empty { text-align:center; padding:32px; color:#a0aec0; }
.divider-or { display:flex; align-items:center; gap:10px; margin:14px 0; color:#a0aec0; font-size:12px; }
.divider-or::before, .divider-or::after { content:""; flex:1; height:1px; background:#e2e8f0; }
.alert { background:#fffbeb; border:1px solid #f6e05e; color:#744210; padding:9px 13px; border-radius:7px; font-size:12px; margin-bottom:12px; }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11px; color:#4a5568; margin-bottom:12px; }
.leg { display:flex; align-items:center; gap:5px; }
.leg-dot { width:10px; height:10px; border-radius:2px; }
.actions { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.row-cnt { font-size:12px; color:#718096; }
.sep { height:1px; background:#e2e8f0; margin:14px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>🗂 아마란스 코드표 업로드 생성기</h1>
  <p class="subtitle">견적서 파일을 올리면 기준코드표 매핑을 적용해 아마란스 업로드용 엑셀 파일을 자동으로 생성합니다</p>

  <!-- ① 주문 기본 정보 -->
  <div class="card">
    <div class="card-title"><span class="icon">1</span> 주문 기본 정보</div>
    <!-- 1행: 주문 핵심 5개 필드 -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:12px;">
      <div class="fg">
        <label>고객코드 (TR_CD) <span style="color:#e53e3e;">*</span></label>
        <input type="text" id="trCd" placeholder="예: 25465">
      </div>
      <div class="fg">
        <label>주문일자 (SO_DT) <span style="color:#e53e3e;">*</span></label>
        <input type="date" id="soDt">
      </div>
      <div class="fg">
        <label>출하예정일 (SHIPREQ_DT) <span style="color:#e53e3e;">*</span></label>
        <input type="date" id="shipDt" oninput="autoSetDueDate()">
      </div>
      <div class="fg">
        <label>납기일 (DUE_DT) <span style="color:#e53e3e;">*</span> <span style="color:#38a169;font-size:10px;font-weight:400;">+45일 자동</span></label>
        <input type="date" id="dueDt">
      </div>
      <div class="fg">
        <label>담당자코드 (PLN_CD) <span style="color:#e53e3e;">*</span></label>
        <select id="plnCd" onchange="updateRemarkSuffix()">
          <option value="">-- 선택 --</option>
          <option value="택배">택배</option>
          <option value="퀵">퀵</option>
          <option value="직배">직배</option>
        </select>
      </div>
    </div>
    <!-- 2행: 단말기 유형 + 비고 -->
    <div style="display:grid;grid-template-columns:180px 400px;gap:12px;align-items:end;">
      <div class="fg">
        <label>단말기 유형 <span style="color:#718096;font-size:10px;font-weight:400;">NICE / KOCES</span></label>
        <select id="terminalType" onchange="rematchImportData()">
          <option value="">-- 해당 없음 --</option>
          <option value="NICE">NICE</option>
          <option value="KOCES">KOCES</option>
        </select>
      </div>
      <div class="fg">
        <label>비고 (REMARK_DC) <span style="color:#e53e3e;">*</span> <span style="color:#718096;font-size:10px;font-weight:400;">계약번호만 입력</span></label>
        <div style="display:flex;align-items:stretch;gap:0;">
          <span style="white-space:nowrap;padding:7px 10px;background:#f7fafc;border:1px solid #e2e8f0;border-right:none;border-radius:6px 0 0 6px;font-size:13px;color:#4a5568;">[렌탈계약]/</span>
          <input type="text" id="contractNo" placeholder="RT20260329-001-1" style="flex:1;min-width:0;border-radius:0;border:1px solid #e2e8f0;padding:7px 10px;font-size:13px;font-family:inherit;color:#2d3748;" oninput="renderPreview()">
          <span id="remarkSuffix" style="white-space:nowrap;padding:7px 10px;background:#f7fafc;border:1px solid #e2e8f0;border-left:none;border-radius:0 6px 6px 0;font-size:13px;color:#4a5568;">/--</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ② 품목 추가 -->
  <div class="card">
    <div class="card-title"><span class="icon">2</span> 품목 추가</div>

    <!-- 파일 업로드 -->
    <div class="upload-area" id="uploadArea">
      <label class="upload-label" for="fileInput">
        <div class="u-icon">📂</div>
        <div class="u-title">견적서 PDF 파일 클릭해서 업로드</div>
      </label>
      <input type="file" id="fileInput" accept=".pdf" onchange="onFileChange(this)">
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <!-- 파싱 결과 -->
    <div id="importSection" style="display:none;"></div>

    <div class="divider-or">직접 입력</div>

    <div class="alert">💡 렌탈 품목은 <strong>부가세포함 총 렌탈금액(단위당)</strong>을 입력. 예) 36개월 × 18,700원 = 673,200원</div>
    <div class="add-row">
      <div class="fg" style="flex:2;">
        <label>품목 선택</label>
        <select id="pSel" style="width:100%;"><option value="">-- 품목 선택 --</option></select>
      </div>
      <div class="fg w80"><label>수량</label><input type="number" id="pQty" value="1" min="1"></div>
      <div class="fg w140"><label>단가(VAT포함,원) <span class="hint">(렌탈만)</span></label><input type="number" id="pPrice" value="0" min="0"></div>
      <button class="btn btn-blue" onclick="addProduct()">+ 추가</button>
    </div>
    <div id="pCodes" style="font-size:11px;color:#718096;margin-bottom:10px;min-height:16px;"></div>

    <div class="plist" id="plist">
      <div class="plist-head"><span>품목명</span><span>수량</span><span>단가(VAT포함)</span><span>포함 코드</span><span></span></div>
      <div id="plistBody"><div class="empty">품목을 추가해주세요</div></div>
    </div>
  </div>

  <!-- ③ 결과 미리보기 -->
  <div class="card">
    <div class="card-title"><span class="icon">3</span> 생성 결과 미리보기</div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#3182ce;"></div><span>03 렌탈</span></div>
      <div class="leg"><div class="leg-dot" style="background:#744210;"></div><span>20 A/S</span></div>
      <div class="leg"><div class="leg-dot" style="background:#553c9a;"></div><span>09 인터넷 패키지</span></div>
      <div class="leg"><div class="leg-dot" style="background:#9b2c2c;"></div><span>19 일시납 프로모션</span></div>
      <div class="leg"><div class="leg-dot" style="background:#276749;"></div><span>02 기본(부자재)</span></div>
      <div class="leg"><div class="leg-dot" style="background:#c05621;"></div><span>04 CX</span></div>
    </div>
    <div id="previewWrap"><div class="empty">📋 품목을 추가하면 미리보기가 표시됩니다</div></div>
    <div class="sep"></div>
    <div class="actions">
      <button class="btn btn-green" onclick="downloadExcel()">⬇ 엑셀 다운로드 (.xlsx)</button>
      <span class="row-cnt" id="rowCnt"></span>
    </div>
  </div>
</div>

<script>
// =====================================================
// SheetJS 동적 로드 (엑셀 다운로드용)
// =====================================================
(function loadXLSX() {
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onerror = function() {
    var s2 = document.createElement('script');
    s2.src = 'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
})();

// =====================================================
// PDF.js 동적 로드
// =====================================================
(function loadPDFJS() {
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload = function() {
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  };
  document.head.appendChild(s);
})();

// =====================================================
// 기준코드표 데이터 (mgmtType 포함)

function showModal(msg) {
  document.getElementById('alertModalMsg').innerHTML = msg;

}

function autoSetDueDate() {
  var ship = document.getElementById('shipDt').value;
  if (!ship) return;
  var today = new Date(); today.setHours(0,0,0,0);
  var shipDate = new Date(ship);
  if (shipDate < today) {
    showModal('⚠️ 출하예정일이 오늘보다 과거입니다.<br>날짜를 다시 확인해주세요.');
  }
  var d = new Date(ship);
  d.setDate(d.getDate() + 45);
  document.getElementById('dueDt').value = d.toISOString().split('T')[0];
}

function onFileChange(input) {

function readFile(file) {
  var st = document.getElementById('uploadStatus');

  readPDF(file);

// =====================================================
// PDF 읽기 및 파싱
// =====================================================
async function readPDF(file) {
  var st = document.getElementById('uploadStatus');
  if (typeof pdfjsLib === 'undefined') {
    setTimeout(function() { readPDF(file); }, 800);
    return;
  }
  try {
    var buffer = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    var allItems = [];
    var pageWidths = {};  // 페이지별 실제 너비 저장
    for (var p = 1; p <= pdf.numPages; p++) {
      var page = await pdf.getPage(p);
      var viewport = page.getViewport({ scale: 1 });
      var textContent = await page.getTextContent();
      var pageH = viewport.height;
      pageWidths[p] = viewport.width;  // 실제 페이지 너비 기록
      textContent.items.forEach(function(item) {
        var t = item.str.trim();
        if (!t) return;
        allItems.push({
          text: t,
          x: item.transform[4],
          y: pageH - item.transform[5],  // top-down Y
          page: p
        });
      });
    }

    // OCR PDF 중복 제거: 같은 위치(±2pt)에 같은 텍스트가 두 겹으로 들어있는 경우 제거
    var dedupedItems = [];
    allItems.forEach(function(item) {
      var isDupe = dedupedItems.some(function(ex) {
        return ex.text === item.text &&
               ex.page === item.page &&
               Math.abs(ex.x - item.x) < 2 &&
               Math.abs(ex.y - item.y) < 2;
      });
      if (!isDupe) dedupedItems.push(item);
    });
    allItems = dedupedItems;

    var contractMonths = extractContractMonths(allItems);
    var items = parsePDFQuotation(allItems, pageWidths);

    // 영수증 용지(셀러 섹션) → 분기별 1박스씩 별도 행: qty=1, quarters=N
    var RECEIPT_NAMES = ['영수증 용지 (2인치)', '영수증 용지 (3인치)'];
    if (contractMonths > 0) {
      items.forEach(function(item) {
        if (item.section === 'seller' && RECEIPT_NAMES.indexOf(item.name) >= 0) {
          item._quarterlyReceipt = true;  // qty는 PDF에서 읽은 값 그대로 유지
          item._quarters = Math.ceil(contractMonths / 3);
        }
      });
    }

    if (items.length === 0) {
      st.textContent = '⚠️ PDF에서 견적서 품목을 찾지 못했습니다. 페이히어 견적서 PDF 확인 필요.';
      return;
    }
    var monthsInfo = contractMonths > 0 ? ' · 계약 ' + contractMonths + '개월' : '';
    st.textContent = '✅ PDF 로드 완료: ' + file.name + ' (' + items.length + '개 품목' + monthsInfo + ')';

    importData = items.map(function(it) {
      var name = it.name;
      // 부자재 섹션의 PC 포스기 → 듀얼모니터 미포함 버전으로 자동 매핑
      if (it.section === 'accessory' && /^PC\s*포스기$/.test(name)) {
        name = 'PC 포스기 (부자재)';
      }
      var mr = matchName(name, it.note);
      return Object.assign({}, it, { matchResult: mr, selectedKey: mr.matches[0] || null });
    });
    autoApplyImport();
  } catch(err) {
    st.textContent = '❌ PDF 오류: ' + err.message;
  }
}

// =====================================================
// 렌탈 계약 기간 추출 (개월 수)
// =====================================================
function extractContractMonths(allItems) {
  // 전략 1: "XX개월" 또는 "XX/개월" 단독 텍스트
  for (var i = 0; i < allItems.length; i++) {
    var m = allItems[i].text.match(/^(\d+)[\/]?개월$/);
    if (m) {
      var n = parseInt(m[1]);
      if (n >= 6 && n <= 120) return n;
    }
  }
  // 전략 1-b: "약정 36개월" 패턴 (신규 포맷 헤더)
  for (var i2 = 0; i2 < allItems.length; i2++) {
    var m2 = allItems[i2].text.match(/약정\s*(\d+)\s*개월/);
    if (m2) {
      var n3 = parseInt(m2[1]);
      if (n3 >= 6 && n3 <= 120) return n3;
    }
    // "약정" 텍스트 근처에 "N개월" 단독 토큰이 오는 경우
    if (/약정/.test(allItems[i2].text) && i2 + 1 < allItems.length) {
      var m3 = allItems[i2 + 1].text.match(/^(\d+)\s*개월$/);
      if (m3) {
        var n4 = parseInt(m3[1]);
        if (n4 >= 6 && n4 <= 120) return n4;
      }
      // 전략 1-c: "· 약정" + "36" + "개월 · 보증금" 패턴 (숫자가 별도 토큰, 개월은 다음 토큰에 접두어)
      for (var k2 = i2 + 1; k2 < Math.min(i2 + 4, allItems.length); k2++) {

  (function mergeGeochiDaeRows() {

      if (qtyIdx2 < 0) return; // 수량 없는 행은 스킵

      // 품목명: left items에서 "정가" 또는 첫 ₩ 이전까지
      // nameEndIdx2를 items.length로 초기화해야 qty가 row.items에 있을 때도 올바르게 동작
      var nameEndIdx2 = items.length;
      items.forEach(function(item, idx){
        if (idx < nameEndIdx2 && (item.text === '정가' || item.text.charAt(0) === '₩')) {
          nameEndIdx2 = idx;
        }
      });

      var name2 = items.slice(0, nameEndIdx2).map(function(i){ return i.text; }).join(' ').trim();
      if (!name2 || SKIP.indexOf(name2) >= 0) return;
      if (HEADER_RE.test(name2) || /^#N\/A/.test(name2)) return;

      var qty2  = parseInt(qtySrc2[qtyIdx2].text);
      var qtyX2 = qtySrc2[qtyIdx2].x;
      var pw2 = pageWidths[row.page] || 595;
      var noteItems2 = row.items.filter(function(i){
        return i.x > qtyX2 && i.x < pw2 * 0.70 && !/^₩/.test(i.text) && !/^\d+$/.test(i.text);
      });
      var note2 = noteItems2.map(function(i){ return i.text; }).join(' ').trim();

      // 신규 포맷 거치대: 설치/전원/색상 속성이 qty 왼쪽에 있거나 별도 행에서 병합된 경우
      // qty 기준 오른쪽 note에 없으면 row 전체 텍스트에서 직접 추출
      if (/^[선후]불형\s*거치대$/.test(name2) && !/설치/.test(note2)) {
        var allRowText2 = row.items.map(function(i){ return i.text; }).join(' ');
        var mAttr = allRowText2.match(/설치\s*[:：]\s*\S+.*색상\s*[:：]\s*\S+/);
        if (mAttr) note2 = mAttr[0].trim();
      }

      result.push({ name:name2, qty:qty2, price:0, note:note2, section:'accessory' });
    }
  });

  return result;
}



// 비고 조합: [렌탈계약]/(계약번호)/(담당자코드)

// 담당자코드 변경 시 비고 suffix 미리보기 업데이트

// 여러 매치에서 NICE/KOCES, 화이트/블랙 필터 적용
// overrideColor: PDF 비고에서 감지한 색상 ("화이트"/"블랙"). 없으면 DOM 드롭다운 값 사용
function applyTypeFilters(matches, overrideColor) {
  var terminalType = (document.getElementById('terminalType') || {}).value || '';
  var mountColor   = overrideColor || '';
  var result = matches.slice();

  // NICE/KOCES 필터
  if (result.length > 1 && terminalType) {
    var f = result.filter(function(k){ return k.indexOf(terminalType) >= 0; });
    if (f.length >= 1) result = f;
  }
  // 화이트/블랙 필터 (거치대 품목에만 적용 — 금전함 등은 색상 선택 영향 X)
  if (result.length > 1 && mountColor) {
    var hasMountStand = result.some(function(k){ return k.indexOf('거치대') >= 0; });
    if (hasMountStand) {
      var f2;
      if (mountColor === '화이트') {
        f2 = result.filter(function(k){ return k.indexOf('화이트') >= 0; });
      } else {
        // 블랙: 화이트 없는 키 우선, 또는 블랙 명시된 키
        f2 = result.filter(function(k){ return k.indexOf('화이트') < 0; });
        if (f2.length === 0) f2 = result.filter(function(k){ return k.indexOf('블랙') >= 0; });
      }
      if (f2 && f2.length >= 1) result = f2;
    }
  }
  return result;
}

// 품목명 + 비고에서 거치대 색상 감지
// 신규 포맷: "색상: 화이트" / "색상: 블랙"
// 구 포맷: "화이트 거치대" / "블랙 거치대"
function detectMountColor(fullCtx) {
  if (/색상[:\s]*화이트/.test(fullCtx) || /화이트\s*거치대/.test(fullCtx)) return '화이트';
  if (/색상[:\s]*블랙/.test(fullCtx)  || /블랙\s*거치대/.test(fullCtx))  return '블랙';
  return '';
}

// 신규 PDF 포맷: "후불형 거치대" / "선불형 거치대" + 비고 "설치: X · 전원: Y · 색상: Z"
// → PRODUCT_MAP 키 "후불형 거치대 (X/Y/Z)" 또는 "선불형 거치대 (X/Y/Z)NICE/KOCES" 생성
function buildMountKey(name, note) {
  var isPostpaid = /^후불형\s*거치대$/.test(name.trim());
  var isPrepaid  = /^선불형\s*거치대$/.test(name.trim());
  if (!isPostpaid && !isPrepaid) return null;
  if (!note) return null;

  // 설치/전원/색상 파싱
  var setupM = note.match(/설치[:\s]*([^\s·,]+)/);
  var powerM = note.match(/전원[:\s]*([^\s·,]+)/);
  var colorM = note.match(/색상[:\s]*([^\s·,]+)/);
  if (!setupM || !powerM || !colorM) return null;

  var setup = setupM[1].trim();
  var power = powerM[1].trim();
  var color = colorM[1].trim();

  // 설치 정규화: "바닥 고정" → "바닥고정"
  setup = setup.replace(/바닥\s*고정/, '바닥고정');

  // 후불형: 색상까지만 (NICE/KOCES 없음)
  if (isPostpaid) {
    return '후불형 거치대 (' + setup + '/' + power + '/' + color + ')';
  }
  // 선불형: NICE/KOCES 접미 필요 (terminalType 드롭다운)
  var termType = (document.getElementById('terminalType') || {}).value || '';
  var baseKey = '선불형 거치대 (' + setup + '/' + power + '/' + color + ')';
  if (termType) return baseKey + termType;
  // terminalType 미선택 시 NICE/KOCES 둘 다 존재하면 multiple로 노출
  return baseKey;
}

// 배터리형 / 유선형 명시되어 있으면 변형 키도 그에 맞게 필터
function applyPowerFilter(matches, fullCtx) {
  if (!matches || matches.length <= 1) return matches;
  var hasBattery = /배터리/.test(fullCtx);
  var hasWired   = /유선/.test(fullCtx);
  if (hasBattery && !hasWired) {
    var f = matches.filter(function(k){ return k.indexOf('배터리') >= 0; });
    if (f.length >= 1) return f;
  } else if (hasWired && !hasBattery) {
    var f2 = matches.filter(function(k){ return k.indexOf('유선') >= 0; });
    if (f2.length >= 1) return f2;
  }
  return matches;
}
function uniq(arr) { return arr.filter(function(v,i){ return arr.indexOf(v)===i; }); }

function matchName(name, note) {
  var keys = Object.keys(PRODUCT_MAP);
  var note2 = note ? String(note).trim() : '';
  // 숫자 내 천단위 쉼표 제거 (예: "30,000mAh" → "30000mAh")
  name = name.replace(/(\d),(\d{3})/g, '$1$2');
  // 숫자와 단위 사이 공백 제거 (예: "30000 mAh" → "30000mAh")
  name = name.replace(/(\d+)\s+([a-zA-Z])/g, '$1$2');
  // 괄호 안쪽 공백 제거 (예: "( PR-200)" → "(PR-200)")
  name = name.replace(/\(\s+/g, '(').replace(/\s+\)/g, ')');

  // ── 신규 포맷 거치대: 비고에서 설치/전원/색상 파싱해 키 직접 구성 ──
  var mountKey = buildMountKey(name, note2);
  if (mountKey) {
    // 정확히 일치하는 키
    if (PRODUCT_MAP[mountKey]) return {type:'exact', matches:[mountKey]};
    // NICE/KOCES 미선택 시 후보 두 개
    var mountCands = keys.filter(function(k){ return k.indexOf(mountKey) === 0; });
    if (mountCands.length === 1) return {type:'exact', matches:mountCands};
    if (mountCands.length > 1)  return {type:'multiple', matches:mountCands};
    // 구성 실패 시 일반 로직으로 폴백
  }

  // ① 품목명 안에 * 가 내포된 경우 baseName / note2 분리
  //    예: "주방용 프린터 PR-200  * blinker 동글 포함" → baseName="주방용 프린터 PR-200", note2="* blinker 동글 포함"
  var baseName = name;
  if (!note2 && name.indexOf('*') >= 0) {
    var si = name.indexOf('*');
    var eb = name.slice(0, si).trim();
    var en = '*' + name.slice(si + 1).trim();
    if (eb) { baseName = eb; note2 = en; }
  }

  var combined = (note2 && note2[0] === '*') ? (baseName + note2) : baseName;
  var fullCtx = name + ' ' + note2;
  // PDF 비고에서 거치대 색상 감지 — 드롭다운 없이도 자동 구분
  var detectedColor = detectMountColor(fullCtx);

  // ③ combined이 PRODUCT_MAP에 없고 note2가 있을 때: * 변형 키를 노트 내용으로 퍼지 매칭
  //    PDF에서 비고가 부분적으로 읽히거나 앞에 * 없이 읽힌 경우를 처리
  //    예: note="blinker 동글 포함" (앞에 * 없음) 또는 note="* blinker" (부분만 읽힌 경우)
  if (!PRODUCT_MAP[combined] && note2) {
    var noteClean = note2.replace(/^\*\s*/, '').trim().toLowerCase();
    var bestFuzzyKey = null, bestFuzzyLen = 0;
    keys.forEach(function(k) {
      if (k.indexOf(baseName) !== 0) return;
      var suffix = k.slice(baseName.length);
      if (suffix[0] !== '*') return;
      var suffixClean = suffix.replace(/^\*\s*/, '').trim().toLowerCase();
      // note가 suffix를 포함하거나, suffix가 note를 포함하는 경우 매칭
      var isMatch = suffixClean && (
        noteClean.indexOf(suffixClean) >= 0 || suffixClean.indexOf(noteClean) >= 0
      );
      if (isMatch && suffixClean.length > bestFuzzyLen) {
        bestFuzzyKey = k; bestFuzzyLen = suffixClean.length;
      }
    });
    if (bestFuzzyKey) combined = bestFuzzyKey;
  }

  // 정확히 일치하는 키가 있어도 색상/단말기 변형이 있으면 필터 적용
  var baseMatches = [];
  if (PRODUCT_MAP[combined]) baseMatches.push(combined);
  else if (PRODUCT_MAP[baseName]) baseMatches.push(baseName);

  if (baseMatches.length > 0) {
    // 같은 이름으로 시작하는 변형(색상/NICE/KOCES/배터리·유선) 키 수집
    // ② * 기반 비고 변형(예: "* blinker 동글 포함")은 note2 가 있을 때만 후보로 올림
    //    → note 없이 기본 품목만 들어온 경우 * 변형과 혼동되는 것을 방지
    var variants = keys.filter(function(k){
      if (k.indexOf(baseName) !== 0 || k.length <= baseName.length) return false;
      var suffix = k.slice(baseName.length);
      if (suffix[0] === '*') return note2.length > 0;  // * 변형: note 있을 때만
      // suffix가 공백으로 시작하고 그 다음이 한글/영문 단어면 별개 제품명 → 제외
      // 예: "페이히어 터미널" + " 맥스KOCES" → 다른 제품, 수집 안 함
      // 허용: "NICE", "KOCES", " (색상)", " (고정/...)" 등 분류 접미사만
      if (suffix[0] === ' ' && /^[가-힣a-zA-Z]/.test(suffix.slice(1))) return false;
      return true;
    });
    if (variants.length > 0) {
      // 기본 키 + 변형 모두 합쳐서 필터 적용
      var allOpts = uniq(applyTypeFilters(baseMatches.concat(variants), detectedColor));
      allOpts = applyPowerFilter(allOpts, fullCtx);
      // ④ note2가 있으면 노트 내용에 가장 잘 맞는 * 변형을 matches[0]으로 정렬
      //    → autoApplyImport가 첫 번째 매핑을 자동 적용하므로 순서가 중요
      if (note2 && allOpts.length > 1) {
        var noteClean3 = note2.replace(/^\*\s*/, '').trim().toLowerCase();
        allOpts.sort(function(a, b) {
          var aSuffix = a.slice(baseName.length).replace(/^\*\s*/, '').trim().toLowerCase();
          var bSuffix = b.slice(baseName.length).replace(/^\*\s*/, '').trim().toLowerCase();
          var aMatch = aSuffix && (noteClean3.indexOf(aSuffix) >= 0 || aSuffix.indexOf(noteClean3) >= 0);
          var bMatch = bSuffix && (noteClean3.indexOf(bSuffix) >= 0 || bSuffix.indexOf(noteClean3) >= 0);
          // 매칭되는 쪽을 앞으로, 둘 다 매칭이면 suffix가 긴 쪽 우선
          // 둘 다 미매칭이면 원래 순서 유지 (기본 키가 먼저 오도록)
          if (aMatch && !bMatch) return -1;
          if (!aMatch && bMatch) return 1;
          if (aMatch && bMatch) return bSuffix.length - aSuffix.length;
          return 0;
        });
      }
      if (allOpts.length===1) return {type:'exact', matches:allOpts};
      if (allOpts.length>1) return {type:'multiple', matches:allOpts};
    }
    return {type:'exact', matches:baseMatches};
  }

  var sw = keys.filter(function(k){ return k.indexOf(baseName)===0 && k.length>baseName.length; });
  sw = applyPowerFilter(applyTypeFilters(sw, detectedColor), fullCtx);
  // 비고 없이 포함/미포함 변형만 있을 때: 미포함을 기본으로 (더 안전한 선택)
  if (sw.length > 1 && !note2) {
    sw.sort(function(a, b) {
      var aIsMi = a.indexOf('미포함') >= 0 ? 0 : 1;
      var bIsMi = b.indexOf('미포함') >= 0 ? 0 : 1;
      return aIsMi - bIsMi;
    });
  }
  if (sw.length===1) return {type:'exact', matches:sw};
  if (sw.length>1) return {type:'multiple', matches:sw};

  var kc = keys.filter(function(k){ return k.indexOf(baseName)>=0 && baseName.length>3; });
  kc = applyPowerFilter(applyTypeFilters(kc), fullCtx);
  if (kc.length===1) return {type:'exact', matches:kc};
  if (kc.length>1) return {type:'multiple', matches:kc};

  return {type:'none', matches:keys};
}

// 드롭다운 변경 시 importData 재매핑 후 products 갱신
function rematchImportData() {
  if (!importData || importData.length === 0) return;
  // importData 원본 이름으로 재매핑
  importData = importData.map(function(it) {
    var mr = matchName(it.name, it.note);
    return Object.assign({}, it, { matchResult: mr, selectedKey: mr.matches[0] || null });
  });
  // 기존 import 품목 제거 후 재추가 (importId로 구분)
  products = products.filter(function(p){ return !p._fromImport; });
  importData.forEach(function(item) {
    if (item.matchResult.type === 'none') return;
    var key = item.matchResult.matches[0];
    if (!key) return;
    products.push({ name:key, qty:item.qty, price:item.price, quarterlyReceipt:item._quarterlyReceipt||false, quarters:item._quarters||1, id:Date.now()+Math.random(), _fromImport:true });
  });
  renderList();
  renderPreview();
}

function showQuotationPreview(items) {
  var ok=0, multi=0, none=0;
  items.forEach(function(i){ if(i.matchResult.type==='exact') ok++; else if(i.matchResult.type==='multiple') multi++; else none++; });

  var html = '<div class="import-box"><div class="import-box-head">'
    +'<span>📄 견적서 파싱 — '+items.length+'개 품목 (✅ 자동 '+ok+' / ⚠️ 선택필요 '+multi+' / ❌ 미매핑 '+none+')</span>'
    +'<button class="btn btn-blue btn-sm" onclick="applyImport()">✅ 적용</button></div>'
    +'<div style="overflow-x:auto;max-height:320px;overflow-y:auto;">'
    +'<table class="itbl"><thead><tr>'
    +'<th>원본 품목명</th><th>섹션</th><th>수량</th><th>금액</th><th>매핑 결과</th><th>포함</th>'
    +'</tr></thead><tbody>';

  items.forEach(function(item, idx) {
    var st = item.matchResult.type==='exact' ? '<span class="s-ok">✅</span>' :
             item.matchResult.type==='multiple' ? '<span class="s-multi">⚠️</span>' :
             '<span class="s-none">❌</span>';
    var secLabel = item.section==='seller'?'셀러':item.section==='service'?'서비스':'부자재';
    var matchCell;
    if (item.matchResult.type==='exact' && item.matchResult.matches.length===1) {
      matchCell = '<span style="color:#276749;font-size:11px;">'+esc(item.matchResult.matches[0])+'</span>';
    } else {
      var opts = item.matchResult.matches.slice(0,50).map(function(m){
        return '<option value="'+esc(m)+'"'+(m===item.selectedKey?' selected':'')+'>'+(m.length>50?m.slice(0,50)+'...':esc(m))+'</option>';
      }).join('');
      matchCell = '<select class="msel" onchange="updMatch('+idx+',this.value)">'
        +'<option value="">-- 선택 --</option>'+opts
        +'<option value="__SKIP__">⛔ 제외</option></select>';
    }
    html += '<tr>'
      +'<td>'+st+' '+esc(item.name)+(item.note?'<br><span style="color:#a0aec0;font-size:10px;">'+esc(item.note)+'</span>':'')+'</td>'
      +'<td style="font-size:11px;color:#718096;">'+secLabel+'</td>'
      +'<td>'+item.qty+'</td>'
      +'<td>'+(item.price>0?item.price.toLocaleString()+'원':'<span style="color:#a0aec0;">-</span>')+'</td>'
      +'<td>'+matchCell+'</td>'
      +'<td><input type="checkbox" id="ic_'+idx+'" '+(item.selectedKey?'checked':'')
      +' style="width:15px;height:15px;cursor:pointer;" onchange="togImport('+idx+',this.checked)"></td>'
      +'</tr>';
  });
  html += '</tbody></table></div></div>';

  var sec = document.getElementById('importSection');
  sec.innerHTML = html;
  sec.style.display = 'block';
}

function updMatch(idx, val) {
  importData[idx].selectedKey = (val==='__SKIP__'||!val) ? null : val;
  document.getElementById('ic_'+idx).checked = !!importData[idx].selectedKey;
}
function togImport(idx, checked) {
  if (!checked) importData[idx].selectedKey = null;
  else if (!importData[idx].selectedKey && importData[idx].matchResult.matches.length>0)
    importData[idx].selectedKey = importData[idx].matchResult.matches[0];
}
// 파일 업로드 후 자동 적용 (모든 매핑된 품목 즉시 추가)
function autoApplyImport() {
  var added = 0, multiInfo = [], skippedInfo = [];
  importData.forEach(function(item) {
    if (item.matchResult.type === 'none') {
      skippedInfo.push(item.name);
      return;
    }
    // exact / multiple 모두 첫 번째 매핑 사용
    var key = item.matchResult.matches[0];
    if (!key) return;
    if (item.matchResult.type === 'multiple') multiInfo.push(item.name);
    products.push({ name:key, qty:item.qty, price:item.price, quarterlyReceipt:item._quarterlyReceipt||false, quarters:item._quarters||1, id:Date.now()+Math.random(), _fromImport:true });
    added++;
  });
  renderList();
  renderPreview();
  document.getElementById('importSection').style.display = 'none';

  var st = document.getElementById('uploadStatus');
  var msg = '✅ ' + added + '개 품목이 목록에 추가됐습니다.';
  if (multiInfo.length > 0) msg += '  ⚠️ 복수매핑(1번째 선택) ' + multiInfo.length + '개: ' + multiInfo.join(' / ');
  if (skippedInfo.length > 0) msg += '  ❌ 미매핑(스킵) ' + skippedInfo.length + '개: ' + skippedInfo.join(', ');
  st.textContent = msg;
}

function applyImport() {
  var added=0;
  importData.forEach(function(item) {
    if (!item.selectedKey || item.selectedKey==='__SKIP__') return;
    products.push({name:item.selectedKey, qty:item.qty, price:item.price, quarterlyReceipt:item._quarterlyReceipt||false, quarters:item._quarters||1, id:Date.now()+Math.random()});
    added++;
  });
  if (added>0) { renderList(); renderPreview(); document.getElementById('importSection').style.display='none'; alert(added+'개 품목 추가됨!'); }
  else alert('적용할 품목이 없습니다.');
}

function onSelChange() {
  var name = document.getElementById('pSel').value;
  var div = document.getElementById('pCodes');
  if (!name || !PRODUCT_MAP[name]) { div.innerHTML=''; return; }
  div.innerHTML = '→ ' + PRODUCT_MAP[name].map(function(c) {
    var mgmt = getMgmtCd(c.mgmtType);
    return '<span class="chip m'+mgmt.replace(/ /g,'')+'">'+c.code+'</span> '+c.name;
  }).join('  |  ');
}

function addProduct() {
  var name = document.getElementById('pSel').value;
  var qty = parseInt(document.getElementById('pQty').value)||1;
  var price = parseFloat(document.getElementById('pPrice').value)||0;
  if (!name) { alert('품목을 선택해주세요.'); return; }
  products.push({name:name, qty:qty, price:price, id:Date.now()});

  document.getElementById('pSel').value='';
  document.getElementById('pPrice').value='0';
  document.getElementById('pQty').value='1';

}

function removeProduct(id) {
  products = products.filter(function(p){ return p.id!==id; });
  renderList(); renderPreview();
}

function renderList() {
  var body = document.getElementById('plistBody');
  if (products.length===0) { body.innerHTML='<div class="empty">품목을 추가해주세요</div>'; return; }
  body.innerHTML = products.map(function(p) {
    var codes = PRODUCT_MAP[p.name]||[];
    var chips = codes.map(function(c){
      var isOOS = OUT_OF_STOCK.indexOf(c.code) >= 0;
      var chipStyle = isOOS ? 'background:#fff5f5;color:#c53030;border:1px solid #fc8181;' : '';
      var oosTag = isOOS ? ' <span style="color:#c53030;font-size:10px;font-weight:700;">⚠ 재고소진</span>' : '';
      return '<div style="margin-bottom:3px;"><span class="chip m'+getMgmtCd(c.mgmtType)+'" style="'+chipStyle+'">'+c.code+'</span> <span style="font-size:11px;color:#4a5568;">'+esc(c.name)+'</span>'+oosTag+'</div>';
    }).join('');
    var hasRental = codes.some(function(c){ return isRentalCode(c.mgmtType); });
    var ps = hasRental ? '<span style="color:#2b6cb0;font-weight:700;">'+p.price.toLocaleString()+'원</span>' : '<span style="color:#a0aec0;">0원</span>';
    var perBox = (codes[0] && codes[0].qty) || 1;
    var qtyLabel = p.quarterlyReceipt && p.quarters > 1
      ? '<span style="color:#6b46c1;font-weight:700;">'+p.quarters+'회 <span style="font-weight:400;font-size:10px;">(분기별 '+perBox+'박스)</span></span>'
      : p.qty+'개';
    return '<div class="plist-row"><span style="font-weight:500;">'+esc(p.name)+'</span><span>'+qtyLabel+'</span><span>'+ps+'</span><span>'+chips+'</span>'
      +'<button class="btn-del" onclick="removeProduct('+p.id+')">삭제</button></div>';
  }).join('');
}

// =====================================================
// 행 생성
// =====================================================
// 영수증 용지 품목 여부 감지 (플래그 또는 품목명 기준)
var RECEIPT_PRODUCT_NAMES = ['영수증 용지 (2인치)', '영수증 용지 (3인치)'];
function isReceiptProduct(p) {
  if (p.quarterlyReceipt && p.quarters > 1) return true;
  return RECEIPT_PRODUCT_NAMES.indexOf(p.name) >= 0;
}

function fmtDate(s) { return parseInt(s.replace(/-/g,''),10); }
function addDaysToInt(dateInt, days) {
  var s = String(dateInt);
  var d = new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));
  d.setDate(d.getDate() + days);
  return parseInt(d.toISOString().split('T')[0].replace(/-/g,''));
}
// 주말이면 평일로 조정 (토요일 → 월요일, 일요일 → 월요일)
function shiftToWeekday(dateInt) {
  var s = String(dateInt);
  var d = new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8));
  var day = d.getDay(); // 0=일, 6=토
  if (day === 6) d.setDate(d.getDate() + 2);
  else if (day === 0) d.setDate(d.getDate() + 1);
  return parseInt(d.toISOString().split('T')[0].replace(/-/g,''));
}

function generateRows(opts) {
  opts = opts || {};
  var trCd = document.getElementById('trCd').value.trim();
  var soDt = fmtDate(document.getElementById('soDt').value);
  var dueDt = fmtDate(document.getElementById('dueDt').value);
  var shipDt = fmtDate(document.getElementById('shipDt').value);
  var plnCd    = opts.plnCdOverride  || document.getElementById('plnCd').value;
  var remarkDc = opts.remarkDcOverride || getRemarkDc(opts.plnCdOverride);
  var rows = [];

  products.forEach(function(prod) {
    var codes = PRODUCT_MAP[prod.name]||[];

    // 영수증 용지 처리
    if (isReceiptProduct(prod)) {
      if (opts.skipReceipt) {
        // 퀵 파일: 1번째 건만 포함 (일반 품목과 동일한 출하일/납기일로)
        codes.forEach(function(comp) {
          var mgmt = getMgmtCd(comp.mgmtType);
          var soQt = prod.qty * comp.qty;
          rows.push(['0',soDt,trCd,'KRW',1,'0','1',plnCd,remarkDc,comp.code,dueDt,shipDt,soQt,'',0,0,0,0,mgmt]);
        });
        return;
      }
      if (opts.onlyReceipt) {
        // 택배 파일: 2번째 건부터 분기별 (q=1 시작)
        if (prod.quarterlyReceipt && prod.quarters > 1) {
          codes.forEach(function(comp) {
            var mgmt = getMgmtCd(comp.mgmtType);
            for (var q = 1; q < prod.quarters; q++) {
              var qShipDt = shiftToWeekday(addDaysToInt(shipDt, q * 90));
              var qDueDt  = addDaysToInt(qShipDt, 45);
              var qSoQt = prod.qty * comp.qty;
              rows.push(['0',soDt,trCd,'KRW',1,'0','1',plnCd,remarkDc,comp.code,qDueDt,qShipDt,qSoQt,'',0,0,0,0,mgmt]);
            }
          });
        }
        return;
      }
      // opts 없음(미리보기 등): 전체 분기 표시 (q=0 부터)
      if (prod.quarterlyReceipt && prod.quarters > 1) {
        codes.forEach(function(comp) {
          var mgmt = getMgmtCd(comp.mgmtType);
          for (var q = 0; q < prod.quarters; q++) {
            // q=0은 최초 출하일(원본 그대로), q>=1은 분기별 → 주말이면 평일로
            var qShipDt = q === 0 ? shipDt : shiftToWeekday(addDaysToInt(shipDt, q * 90));
            var qDueDt  = addDaysToInt(qShipDt, 45);
            var qSoQt = prod.qty * comp.qty;
            rows.push(['0',soDt,trCd,'KRW',1,'0','1',plnCd,remarkDc,comp.code,qDueDt,qShipDt,qSoQt,'',0,0,0,0,mgmt]);
          }
        });
        return;
      }
    }
    // 일반 품목 필터 (onlyReceipt 모드에서 제외)
    if (opts.onlyReceipt) return;

    // 일반 품목
    var priceAssigned = false;
    codes.forEach(function(comp) {
      var mgmt = getMgmtCd(comp.mgmtType);
      // 이용가이드 단독 품목(이름이 '이용가이드_'로 시작)만 주문건당 1개 고정
      // SET 안에 포함된 이용가이드(예: SS0081)는 수량 그대로 적용
      var soQt = (comp.name && /^이용가이드/.test(comp.name)) ? 1 : prod.qty * comp.qty;
      var vatUm=0, sogAm=0, sovAm=0, sohAm=0;
      if (isRentalCode(comp.mgmtType) && !priceAssigned && prod.price>0) {
        vatUm=prod.price; sogAm=Math.round(vatUm/1.1); sovAm=vatUm-sogAm; sohAm=vatUm;
        priceAssigned=true;
      }
      rows.push(['0',soDt,trCd,'KRW',1,'0','1',plnCd,remarkDc,comp.code,dueDt,shipDt,soQt,'',vatUm,sogAm,sovAm,sohAm,mgmt]);
    });
  });
  return rows;
}

function renderPreview() {
  var wrap = document.getElementById('previewWrap');
  var rows = generateRows();
  if (rows.length===0) { wrap.innerHTML='<div class="empty">📋 품목을 추가하면 미리보기가 표시됩니다</div>'; document.getElementById('rowCnt').textContent=''; return; }
  document.getElementById('rowCnt').textContent='총 '+rows.length+'행';
  var ths=['품번','수량','단가(VAT포함)','공급가','부가세','합계액','MGMT','고객코드','주문일자','출하예정일','납기일','담당자','비고'];
  var idxMap=[9,12,14,15,16,17,18,2,1,11,10,7,8];
  var html='<div class="preview-wrap"><table class="ptbl"><thead><tr>'+ths.map(function(h){ return '<th>'+h+'</th>'; }).join('')+'</tr></thead><tbody>';
  rows.forEach(function(r) {
    html+='<tr>';
    idxMap.forEach(function(i,j) {
      var v=r[i];
      if (j===0) html+='<td><span class="chip m'+(r[18]||'02')+'">'+v+'</span></td>';
      else if (j===6) html+='<td><b>'+v+'</b></td>';
      else if ([2,3,4,5].indexOf(j)>=0) html+='<td>'+(v>0?Number(v).toLocaleString():'-')+'</td>';
      else html+='<td>'+esc(String(v||''))+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  wrap.innerHTML=html;
}

function buildAndDownload(dataRows, trCd, suffix) {
  if (!window.XLSX) { alert('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  var wb2 = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet([H1, H2, H3].concat(dataRows));
  ws['!cols'] = CWID;
  XLSX.utils.book_append_sheet(wb2, ws, 'sheet1');
  var today = new Date().toISOString().split('T')[0].replace(/-/g,'');
  var fname = '아마란스_코드표_업로드_'+trCd+'_'+today+(suffix?'_'+suffix:'')+'.xlsx';
  XLSX.writeFile(wb2, fname);
}

function downloadExcel() {
  var rows = generateRows();
  if (rows.length===0) { showModal('품목을 먼저 추가해주세요.'); return; }
  var trCd = document.getElementById('trCd').value.trim();
  if (!trCd) { showModal('고객코드를 입력해주세요.'); return; }
  var plnCd = document.getElementById('plnCd').value;
  if (!plnCd) { showModal('담당자코드를 선택해주세요.'); return; }
  var contractNo = (document.getElementById('contractNo').value || '').trim();
  if (!contractNo) { showModal('계약번호를 입력해주세요.<br><span style="font-size:12px;color:#718096;">예: RT20260329-001-1</span>'); return; }
  var remarkDc = getRemarkDc();

  // 재고 소진 품목 체크
  var oosFound = [];
  products.forEach(function(p) {
    var codes = PRODUCT_MAP[p.name] || [];
    codes.forEach(function(c) {
      if (OUT_OF_STOCK.indexOf(c.code) >= 0 && oosFound.indexOf(c.code) < 0) {
        oosFound.push(c.code + ' (' + c.name + ')');
      }
    });
  });
  if (oosFound.length > 0) {
    showModal('⚠️ 현재 출고 불가 품목이 포함되어 있습니다.<br><br><span style="color:#c53030;font-weight:700;">' + oosFound.join('<br>') + '</span><br><br>출고 전 재고를 다시 확인해주세요.');
    return;
  }

  // 퀵 + 분기 영수증 → 2개 파일 자동 분리
  var hasQR = products.some(function(p){ return isReceiptProduct(p); });
  if (plnCd === '퀵' && hasQR) {
    var quickRows    = generateRows({ skipReceipt: true });
    var delivRemark  = getRemarkDc('택배');
    var delivRows    = generateRows({ onlyReceipt: true, plnCdOverride: '택배', remarkDcOverride: delivRemark });
    if (quickRows.length > 0)  buildAndDownload(quickRows, trCd, '퀵');
    if (delivRows.length > 0)  buildAndDownload(delivRows, trCd, '택배');
  } else {
    buildAndDownload(rows, trCd);
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
